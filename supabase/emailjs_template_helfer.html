<!--
  EmailJS-Template für "Helfer der Liebe" (helfer-der-liebe.html)
  ==================================================================
  Im EmailJS-Dashboard (dashboard.emailjs.com) -> Email Templates ->
  Create New Template einfügen:

    To email:  {{to_email}}
    Subject:   {{betreff}}
    Content:   dieser HTML-Code hier (Editor auf HTML/Code-Modus stellen)

  Nach dem Speichern die Template-ID in helfer-der-liebe.html bei
  EMAILJS_TEMPLATE_ID eintragen (aktuell Platzhalter
  'TEMPLATE_ID_HIER_EINTRAGEN').

  Variablen, die der Code befüllt (siehe sendMail() in
  helfer-der-liebe.html): to_email, to_name, betreff, inhalt.
  "inhalt" ist ein Freitext mit \n-Zeilenumbrüchen (deshalb
  white-space: pre-line unten) - kein HTML darin, also keine
  Injection-Gefahr.
-->
<div style="font-family: system-ui, sans-serif, Arial; font-size: 14px; color: #3a3228; max-width: 600px; margin: 0 auto;">

  <style>
    @media only screen and (max-width: 700px) {
      .stack-column,
      .stack-column td {
        display: block !important;
        width: 100% !important;
      }

      .mobile-image {
        max-width: 100% !important;
        width: 100% !important;
        height: auto !important;
        margin-bottom: 20px !important;
      }

      .mobile-padding {
        padding-right: 0 !important;
      }
    }
  </style>

  <div style="background: #f2ead8; padding: 24px; border-left: 4px solid #7a8c6e; border-radius: 10px;">

    <!-- Header -->
    <div style="font-size: 20px; font-weight: bold; color: #7a8c6e; margin-bottom: 4px;">
      🌿 Helfer der Liebe
    </div>

    <div style="color: #9c7e63; font-size: 13px; margin-bottom: 24px;">
      Hochzeit Selina & Nicolai · 12. September 2026
    </div>

    <!-- Responsive Layout -->
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
      <tr class="stack-column">

        <!-- Bild -->
        <td class="mobile-padding"
            style="width: 180px; vertical-align: top; padding-right: 20px;">

          <img
            src="https://flagshipr.github.io/Hochzeit-Selina-Nico/sektglas.jpeg"
            alt="Selina & Nicolai"
            class="mobile-image"
            style="
              width: 180px;
              max-width: 180px;
              border-radius: 12px;
              display: block;
              height: auto;
            "
          >
        </td>

        <!-- Inhalt -->
        <td style="vertical-align: top;">

          <!-- Betreff-Zeile, hervorgehoben -->
          <div style="background: #faf7f0; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-weight: bold; color: #3a3228;">
            {{betreff}}
          </div>

          <!-- Anrede + Freitext -->
          <div style="background: #faf7f0; border-radius: 8px; padding: 16px 18px; line-height: 1.6;">
            Hallo {{to_name}},
            <br><br>
            <div style="white-space: pre-line;">{{inhalt}}</div>
          </div>

        </td>
      </tr>
    </table>

    <!-- Footer -->
    <div style="margin-top: 24px; font-size: 12px; color: #a8b89a; text-align: center;">
      🌿 Danke, dass du uns hilfst!<br>
      Diese Nachricht wurde automatisch über die Helfer-der-Liebe-Seite gesendet.
      <div style="font-size: 20px; margin-top: 10px;">❤️</div>
    </div>

  </div>
</div>
